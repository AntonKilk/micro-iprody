spring.application.name=payment-service
server.port=8082
spring.datasource.url=jdbc:h2:mem:paymentdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
logging.level.org.springframework.web=DEBUG
spring.mvc.log-request-details=true
# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.paymentServiceCircuitBreaker.register-health-indicator=true
resilience4j.circuitbreaker.instances.paymentServiceCircuitBreaker.sliding-window-size=50
resilience4j.circuitbreaker.instances.paymentServiceCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.paymentServiceCircuitBreaker.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.paymentServiceCircuitBreaker.permitted-number-of-calls-in-half-open-state=10
resilience4j.circuitbreaker.instances.paymentServiceCircuitBreaker.minimum-number-of-calls=20
resilience4j.circuitbreaker.instances.paymentServiceCircuitBreaker.record-exceptions[0]=feign.FeignException