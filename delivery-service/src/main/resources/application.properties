spring.application.name=delivery-service
server.port=8083
spring.datasource.url=jdbc:h2:mem:deliverydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.deliveryServiceCircuitBreaker.register-health-indicator=true
resilience4j.circuitbreaker.instances.deliveryServiceCircuitBreaker.sliding-window-size=50
resilience4j.circuitbreaker.instances.deliveryServiceCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.deliveryServiceCircuitBreaker.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.deliveryServiceCircuitBreaker.permitted-number-of-calls-in-half-open-state=10
resilience4j.circuitbreaker.instances.deliveryServiceCircuitBreaker.minimum-number-of-calls=20
resilience4j.circuitbreaker.instances.deliveryServiceCircuitBreaker.record-exceptions[0]=feign.FeignException